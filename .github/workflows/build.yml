# SPDX-License-Identifier: Apache-2.0
name: Build

on:
  push:
    branches: [ main, feat/*, feature/* ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake
        # Install LLVM and Clang 20
        wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
        sudo apt-add-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-20 main"
        sudo apt-get update
        sudo apt-get install -y llvm-20 llvm-20-dev clang-20 libclang-20-dev
        echo "LLVM_DIR=/usr/lib/llvm-20/lib/cmake/llvm" >> $GITHUB_ENV
        echo "Clang_DIR=/usr/lib/llvm-20/lib/cmake/clang" >> $GITHUB_ENV

    - name: Compute next version (SemVer)
      id: semver
      run: |
        python3 scripts/ci/semver_check.py

    - name: Set up QEMU (Linux)
      if: runner.os == 'Linux'
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    - name: Set up Docker Buildx (Linux)
      if: runner.os == 'Linux'
      uses: docker/setup-buildx-action@v3

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install cmake llvm@20
        echo "LLVM_DIR=$(brew --prefix llvm@20)/lib/cmake/llvm" >> $GITHUB_ENV
        echo "Clang_DIR=$(brew --prefix llvm@20)/lib/cmake/clang" >> $GITHUB_ENV
        echo "$(brew --prefix llvm@20)/bin" >> $GITHUB_PATH

    - name: Configure and Build (Linux/macOS)
      if: runner.os == 'Linux' || runner.os == 'macOS'
      run: |
        mkdir -p build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release \
                -DLLVM_DIR=${{ env.LLVM_DIR }} \
                -DClang_DIR=${{ env.Clang_DIR }} \
                -DUSE_SHARED_LIB=OFF \
                -DBUILD_TESTS=OFF
        cmake --build . --config Release

    - name: Test compiler (Linux/macOS)
      if: runner.os == 'Linux' || runner.os == 'macOS'
      run: |
        cd build
        echo 'int main() { return 0; }' > test.cc
        ./cc -S -emit-llvm test.cc

        # Vérifier que le fichier LLVM IR a été généré
        if [ -f "test.ll" ]; then
          echo "Test réussi: Fichier LLVM IR généré avec succès"
          cat test.ll | head -n 10
        else
          echo "Test échoué: Fichier LLVM IR non généré"
          exit 1
        fi

    - name: Run Python smoke tests (Linux/macOS)
      if: runner.os == 'Linux' || runner.os == 'macOS'
      run: |
        python3 -m venv .venv
        source .venv/bin/activate
        python -m pip install --upgrade pip
        python -m pip install git+https://github.com/CoreTrace/coretrace-testkit.git
        python test/examples/test_smoke.py
        python3 test/examples/test_extern_project.py

    - name: Docker tests (multi-arch, Linux)
      if: runner.os == 'Linux' && github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        docker buildx build --platform linux/amd64 -f test/docker/Dockerfile . --progress=plain --output=type=cacheonly
        docker buildx build --platform linux/arm64 -f test/docker/Dockerfile . --progress=plain --output=type=cacheonly

  build-windows:
    name: Build on Windows (pinned LLVM 20.1.0)
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Resolve dependency ref
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $ref = if ($env:GITHUB_HEAD_REF) { $env:GITHUB_HEAD_REF } else { $env:GITHUB_REF_NAME }
        "DEPENDENCY_REF=$ref" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Checkout coretrace-log matching ref
      id: checkout_logger_ref
      continue-on-error: true
      uses: actions/checkout@v4
      with:
        repository: CoreTrace/coretrace-log
        ref: ${{ env.DEPENDENCY_REF }}
        path: deps/coretrace-log
        fetch-depth: 1

    - name: Checkout coretrace-log main fallback
      if: steps.checkout_logger_ref.outcome == 'failure'
      uses: actions/checkout@v4
      with:
        repository: CoreTrace/coretrace-log
        ref: main
        path: deps/coretrace-log
        fetch-depth: 1

    - name: Install LLVM 20.1.0 to fixed location
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $llvmVersion = "20.1.0"
        $installerUrl = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$llvmVersion/LLVM-$llvmVersion-win64.exe"
        $installerPath = "$env:RUNNER_TEMP\LLVM-$llvmVersion-win64.exe"
        $installRoot = "C:\Program Files\LLVM-$llvmVersion"
        $llvmCmakeDir = "$installRoot\lib\cmake\llvm"
        $clangCmakeDir = "$installRoot\lib\cmake\clang"

        Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath
        Start-Process -FilePath $installerPath -ArgumentList @("/S", "/D=$installRoot") -Wait -NoNewWindow

        if (-not (Test-Path "$installRoot\bin\clang-cl.exe")) {
          throw "clang-cl.exe not found after LLVM install: $installRoot\bin\clang-cl.exe"
        }
        if (-not (Test-Path $llvmCmakeDir)) {
          throw "LLVM CMake package dir not found: $llvmCmakeDir"
        }
        if (-not (Test-Path $clangCmakeDir)) {
          throw "Clang CMake package dir not found: $clangCmakeDir"
        }

        $clangVersion = & "$installRoot\bin\clang-cl.exe" --version
        if ($clangVersion -notmatch "clang version 20\.1\.0") {
          throw "Unexpected clang-cl version. Got: $clangVersion"
        }

        "LLVM_CMAKE_DIR=$llvmCmakeDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "LLVM_DIR=$llvmCmakeDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "Clang_DIR=$clangCmakeDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Configure + Build + Install
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        powershell -ExecutionPolicy Bypass -File .\scripts\build-windows.ps1 `
          -LLVMDir "${env:LLVM_CMAKE_DIR}" `
          -LoggerSourceDir "${PWD}\deps\coretrace-log" `
          -Configuration Release

    - name: Smoke test
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        Set-Content -Path test.cc -Value 'int main() { return 0; }'
        .\dist\windows\bin\cc.exe -S -emit-llvm test.cc
        if (-not (Test-Path test.ll)) {
          throw "test.ll was not produced"
        }
        Get-Content test.ll -TotalCount 10

    - name: Run Python smoke tests (Windows)
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        python -m venv .venv
        .\.venv\Scripts\python -m pip install --upgrade pip
        .\.venv\Scripts\python -m pip install git+https://github.com/CoreTrace/coretrace-testkit.git
        $env:CORETRACE_COMPILER_TEST_CC = (Resolve-Path .\dist\windows\bin\cc.exe).Path
        $env:CORETRACE_LOGGER_SOURCE_DIR = (Resolve-Path .\deps\coretrace-log).Path
        .\.venv\Scripts\python .\test\examples\test_smoke.py
        .\.venv\Scripts\python .\test\examples\test_extern_project.py
